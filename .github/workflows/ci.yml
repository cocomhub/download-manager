name: CI

on:
  push:
    branches: [dev, main, master, "release/**"]
  pull_request:
    branches: [dev, main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          check-latest: true

      - name: Verify dependencies
        run: go mod verify

      - name: Build
        run: go build ./...

      - name: Run tests
        run: go test ./... -v -count=1 -timeout=180s

      - name: Run tests (no mongo)
        run: go test -tags no_mongo ./... -v -count=1 -timeout=180s

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=3m

  playwright:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          check-latest: true
          cache-dependency-path: |
            go.sum
            cmd/playwright-server/go.sum

      - name: Build test server
        working-directory: cmd/playwright-server
        run: go build -o playwright-server .

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: test/playwright/package-lock.json

      - name: Install dependencies
        working-directory: test/playwright
        run: npm ci

      - name: Restore Playwright browsers cache
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('test/playwright/package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: test/playwright
        run: npx playwright install chromium --with-deps

      - name: Ensure Playwright browsers (cache-hit fallback)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        working-directory: test/playwright
        run: npx playwright install chromium --with-deps 2>/dev/null || true

      - name: Run Playwright tests
        working-directory: test/playwright
        env:
          SERVER_BINARY: ../../cmd/playwright-server/playwright-server
          TEST_PORT: 19199
        run: npx playwright test

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-artifacts
          path: |
            test/playwright/test-results/
            test/playwright/artifacts/
          retention-days: 7