name: CI

on:
  push:
    branches: [dev, main, master, "release/**"]
  pull_request:
    branches: [dev, main, master]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macOS-latest]
        go: ["1.26"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          check-latest: true

      - name: Configure private module access
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git config --global url."https://x-access-token:${GH_PAT}@github.com/".insteadOf "https://github.com/"
        shell: bash

      - name: Verify dependencies
        if: matrix.os == 'ubuntu-latest'
        env:
          GOPRIVATE: github.com/cocomhub/*
          GONOSUMCHECK: github.com/cocomhub/*
          GONOSUMDB: github.com/cocomhub/*
        run: go mod verify

      - name: Build
        run: go build ./...

      - name: Run tests with coverage
        run: go test -race -count=1 -coverprofile=build/cover_unit.out -covermode=atomic -timeout=180s ./...

      - name: Run tests (no mongo) with coverage
        run: go test -tags no_mongo -race -count=1 -coverprofile=build/cover_no_mongo.out -covermode=atomic -timeout=180s ./...

      - name: Lint
        if: matrix.os == 'ubuntu-latest' && matrix.go == '1.26'
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest
          args: --timeout=3m

      - name: Merge coverage reports
        shell: bash
        run: |
          mkdir -p build
          echo "mode: atomic" > build/cover.out
          for f in build/cover_unit.out build/cover_no_mongo.out; do
            if [ -f "$f" ]; then
              tail -n +2 "$f" >> build/cover.out
            fi
          done

      - name: Generate coverage report
        shell: bash
        run: |
          go tool cover -html=build/cover.out -o build/cover.html
          echo "## Coverage Report" >> $GITHUB_STEP_SUMMARY
          go tool cover -func=build/cover.out >> $GITHUB_STEP_SUMMARY

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: build/cover.out
          flags: unittests
          fail_ci_if_error: false

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ matrix.os }}-${{ matrix.go }}
          path: |
            build/cover.out
            build/cover.html
          retention-days: 7

      - name: Run benchmarks
        if: matrix.os == 'ubuntu-latest' && matrix.go == '1.26'
        run: go test -bench=. -benchmem -count=3 -run=^$ ./... > build/bench.txt

      - uses: benchmark-action/github-action-benchmark@52576c92bccf6ac60c8223ec7eb2565637cae9ba  # v1.22.1
        if: matrix.os == 'ubuntu-latest' && matrix.go == '1.26'
        with:
          tool: go
          output-file-path: build/bench.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          alert-threshold: "200%"
          comment-on-alert: true
          fail-on-alert: false

  playwright:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          check-latest: true
          cache-dependency-path: |
            go.sum
            cmd/playwright-server/go.sum

      - name: Build test server
        working-directory: cmd/playwright-server
        run: go build -o playwright-server .

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: test/playwright/package-lock.json

      - name: Install dependencies
        working-directory: test/playwright
        run: npm ci

      - name: Restore Playwright browsers cache
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('test/playwright/package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: test/playwright
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        working-directory: test/playwright
        env:
          SERVER_BINARY: ../../cmd/playwright-server/playwright-server
          TEST_PORT: 19199
        run: npx playwright test

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-artifacts
          path: |
            test/playwright/test-results/
            test/playwright/playwright-report/
            test/playwright/artifacts/
          retention-days: 7

      - name: Generate test summary
        if: always()
        working-directory: test/playwright
        run: bash ../../scripts/playwright-report-gen.sh test-results
