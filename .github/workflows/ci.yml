name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [dev, main, master, "release/**"]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'ROADMAP.md'
      - '.gitignore'
      - '.editorconfig'
      - '.notestignore'
      - '.dockerignore'
      - 'LICENSE'
  pull_request:
    branches: [dev, main, master]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'ROADMAP.md'
      - '.gitignore'
      - '.editorconfig'
      - '.notestignore'
      - '.dockerignore'
      - 'LICENSE'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macOS-latest]
        go: ["1.26"]
    permissions:
      contents: write   # auto-push 需要
      deployments: write
      pull-requests: write # 允许创建PR Review评论
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ${{ matrix.go }}
          check-latest: true

      - name: Ensure make (Windows)
        if: matrix.os == 'windows-latest'
        run: choco install make -y --no-progress
        shell: pwsh

      - name: Configure private module access
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git config --global url."https://x-access-token:${GH_PAT}@github.com/".insteadOf "https://github.com/"
        shell: bash

      - name: Verify dependencies
        if: matrix.os == 'ubuntu-latest'
        env:
          GOPRIVATE: github.com/cocomhub/*
          GONOSUMCHECK: github.com/cocomhub/*
          GONOSUMDB: github.com/cocomhub/*
        run: go mod verify

      - name: Build
        run: |
          make build-ci
          make build-all

      - name: Run tests with coverage
        run: make test-cover

      - name: Check coverage threshold
        run: make cover-check

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          files: build/cover.out
          flags: unittests
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: Upload coverage artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-report-${{ matrix.os }}-${{ matrix.go }}
          path: build/cover.out
          retention-days: 7

      - name: Run benchmarks
        if: matrix.os == 'ubuntu-latest' && matrix.go == '1.26'
        run: make bench

      - name: Store benchmark result
        uses: benchmark-action/github-action-benchmark@52576c92bccf6ac60c8223ec7eb2565637cae9ba  # v1.22.1
        if: matrix.os == 'ubuntu-latest' && matrix.go == '1.26'
        continue-on-error: true
        with:
          tool: 'go'
          output-file-path: build/bench/bench.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          alert-threshold: '100%'
          comment-on-alert: true
          fail-on-alert: false
          skip-fetch-gh-pages: false
          comment-always: true
          summary-always: true
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: dev/bench

  test-no-mongo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.26"
          check-latest: true

      - name: Configure private module access
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git config --global url."https://x-access-token:${GH_PAT}@github.com/".insteadOf "https://github.com/"
        shell: bash

      - name: Run tests (no mongo) with coverage
        run: make cover-check GOTAGS="-tags no_mongo"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          files: build/cover.out
          flags: no_mongo
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: Upload coverage artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-report-no-mongo
          path: |
            build/cover.out
          retention-days: 7

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.26"
          check-latest: true

      - name: Configure private module access
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git config --global url."https://x-access-token:${GH_PAT}@github.com/".insteadOf "https://github.com/"

      - name: Lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9
        with:
          version: latest
          args: --timeout=3m

  playwright:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.26"
          check-latest: true
          cache-dependency-path: |
            go.sum
            cmd/playwright-server/go.sum

      - name: Build test server
        working-directory: cmd/playwright-server
        run: go build -o playwright-server .

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: test/playwright/package-lock.json

      - name: Install dependencies
        working-directory: test/playwright
        run: npm ci

      - name: Restore Playwright browsers cache
        id: playwright-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('test/playwright/package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: test/playwright
        run: npx playwright install --with-deps chromium firefox

      - name: Ensure snapshot directories writable
        working-directory: test/playwright
        run: |
          mkdir -p snapshots
          chmod -R u+w snapshots 2>/dev/null || true

      - name: Run Playwright tests
        working-directory: test/playwright
        env:
          SERVER_BINARY: ../../cmd/playwright-server/playwright-server
          TEST_PORT: 19199
        run: npx playwright test

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: playwright-artifacts
          path: |
            test/playwright/test-results/
            test/playwright/playwright-report/
            test/playwright/artifacts/
          retention-days: 7

      - name: Generate test summary
        if: always()
        working-directory: test/playwright
        run: bash ../../scripts/playwright-report-gen.sh test-results

  sonar:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.26"
          check-latest: true

      - name: Configure private module access
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git config --global url."https://x-access-token:${GH_PAT}@github.com/".insteadOf "https://github.com/"
        shell: bash

      - name: Run tests with coverage
        run: make test-cover

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
