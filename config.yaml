server:
  http_port: 8080
  ui_only_port: 8091
  work_dir: ./build/test
  lock_file: ./build/test/download-manager.lock
  scraper_path: ./build/bin/scraper_get
  ui_defaults:
    default_save_dir: ./downloads
    window_width: 1200
    window_height: 800
    diff_side_by_side: false
    diff_ignore_ws: false
    diff_ignore_comment: false
    status_style: overlay
runtime:
  mode: ui
log:
  level: debug
  filename: ./build/test/logs/app.log
  max_size: 10
  max_backups: 3
  max_age: 28
  console: true
  compress: true
mongo:
  - name: suixi-mini
    uri: mongodb://root:root123@suixi-mini.local:27017/download_manager?authSource=admin
downloader:
  type: native
  global_concurrent: 1
  max_retries: 3
  log_dir: ./build/test/logs/downloader
  force_proxy: false
  proxies:
    - http://129.226.212.209:18080
    - http://43.159.49.114:18080
  # 新配置结构（可选，未设置时按默认值与兼容逻辑工作）：
  # filesystem:
  #   root_dir: ./build/test/downloads     # 若未设置，默认 <server.work_dir>/downloads
  #   log_dir: logs                        # 相对 root_dir，默认 "logs"
  #   cache_dir: .cache                    # 相对 root_dir，默认 ".cache"
  # http:
  #   timeout_seconds: 600
  #   idle_conn_timeout_seconds: 30
  #   max_idle_conns: 100
  #   max_idle_conns_per_host: 10
  #   default_user_agent: ""               # 为空则使用内置 UA
  #   disable_inject_browser_like_headers: false
  # proxy:
  #   force: false
  #   list:
  #     - http://127.0.0.1:7890
  #   decision_cache_ttl_secs: 1
  #   direct_probe_timeout_secs: 3
  #   bandwidth_path_suffix: /bandwidth
  # progress:
  #   min_percent_step: 0.5
  #   max_interval_seconds: 10
  # ffmpeg:
  #   path: ffmpeg
  #   extra_args: []
  #   move_if_exists:
  #     enabled: false
  #   external_hls_log:
  #     enabled: false
  #   hls_auto_mark_as_fail: false
task_scan:
  disable: false
  interval: 10
tasks:
  - id: task-file-001
    type: url_list
    save_dir: ./build/test/downloads/task1
    storage:
      type: file
      config:
        path: ./build/test/downloads/task1/status.json
        save_interval: "2"
    extra:
      urls:
        - https://www.baidu.com/robots.txt
        - https://www.bing.com/robots.txt
  - id: task-mongo-001
    type: url_list
    save_dir: ./build/test/downloads/task2
    storage:
      type: mongo
      config:
        collection: task_mongo_001
        database: download_manager
        source: suixi-mini
    extra:
      urls:
        - https://www.bing.com/robots.txt
  - id: task-vikacg-001
    type: vikacg
    save_dir: ./build/test/downloads/vikacg
    storage:
      type: file
      config:
        path: ./build/test/downloads/vikacg/status.json
        save_interval: "2"
    extra:
      max_concurrent: 2
      urls:
        - https://www.vikacg.com/p/511657
  - id: task-hanime-001
    type: hanime
    save_dir: ./build/test/downloads/hanime
    storage:
      type: file
      config:
        path: ./build/test/downloads/hanime/status.json
        save_interval: "2"
    extra:
      keyword: 裏番
      max_concurrent: 1
      refresh_interval: 3600
      path_strategy: first_fixed
      save_dir_add_keyword: false
