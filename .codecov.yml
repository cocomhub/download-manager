codecov:
  require_ci_to_pass: true
  notify:
    after_n_builds: 1

coverage:
  status:
    project:
      default:
        target: 40%       # 与 make cover-check 的 COVER_THRESHOLD 40% 一致
        threshold: 2%
    patch:
      default:
        target: 60%       # 新代码期望 60%

comment:
  layout: "reach, diff, flags, files"
  behavior: default
  require_changes: false
